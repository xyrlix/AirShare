name: airshare_frontend
description: AirShare跨平台文件传输应用前端

# 发布管理
publish_to: 'none'

# 版本信息
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

# 依赖项
dependencies:
  flutter:
    sdk: flutter
  
  # 核心框架
  flutter_riverpod: ^2.4.0
  
  # 网络通信
  web_socket_channel: ^3.0.0
  http: ^1.1.0
  
  # 文件处理
  file_picker: ^6.1.0
  path_provider: ^2.1.1
  
  # 数据存储
  shared_preferences: ^2.2.2
  
  # 工具类
  uuid: ^4.2.0
  crypto: ^3.0.3
  
  # 国际化
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1

# 开发依赖项
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# flutter配置
flutter:
  uses-material-design: true
